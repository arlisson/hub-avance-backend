<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <script>
      (function () {
        const isDark = localStorage.getItem('theme') !== 'light';
        if (isDark) document.body.classList.add('dark-mode');
        document.addEventListener('DOMContentLoaded', function () {
          const icon = document.querySelector('#theme-toggle i');
          if (icon) icon.className = isDark ? 'ph ph-sun' : 'ph ph-moon';
        });
      })();
    </script>

    <button class="theme-toggle-login" id="theme-toggle" type="button" aria-label="Alternar tema">
      <i class="ph ph-sun"></i>
    </button>

    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <div class="login-logo-container">
            <img src="../img/LogoEscuroSemFundo.png" alt="Logo Avance" class="company-logo logo-escuro" />
            <img src="../img/LogoClaraSemFundo.png" alt="Logo Avance" class="company-logo logo-claro" />
          </div>
          <h1>Bem-vindo</h1>
          <p>Entre com suas credenciais para continuar</p>
        </div>

        <form id="login-form">
          <div class="input-group">
            <label for="identifier">E-mail</label>
            <div class="input-wrapper">
              <i class="ph ph-user input-icon"></i>
              <input
                type="text"
                id="identifier"
                placeholder="exemplo@email.com"
                required
              />
            </div>
          </div>

          <div class="input-group">
            <label for="password">Senha</label>
            <div class="input-wrapper">
              <i class="ph ph-lock input-icon"></i>
              <input
                type="password"
                id="password"
                placeholder="••••••••"
                required
              />
              <button
                type="button"
                class="toggle-password"
                id="toggle-password"
              >
                <i class="ph ph-eye"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="login-btn">Entrar</button>
        </form>

        <div class="login-footer">
          <p>
            Não tem uma conta?
            <a href="../cadastro/cadastro.html">Cadastre-se</a>
          </p>
          <a href="#" id="forgot-password-link">Esqueci minha senha</a>
        </div>
      </div>
    </div>

    
    <script src="/login.js" defer></script>
  </body>
</html>
